<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniRide — Sign In</title>
<link rel="stylesheet" href="styles.css">
<style>
  .brand-mark { text-align: center; margin-bottom: 2rem; }
  .brand-mark .logo { font-size: 1.8rem; }
  .brand-mark p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; font-weight: 300; }
  .card h2 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
  .card .sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.8rem; font-weight: 300; }
  .forgot { font-size: 0.8rem; color: var(--muted); text-align: right; margin-top: -0.6rem; margin-bottom: 1rem; display: block; }
  .forgot:hover { color: var(--accent); }
  .signup-prompt { text-align: center; font-size: 0.85rem; color: var(--muted); margin-top: 1.2rem; }
  .signup-prompt a { color: var(--accent); font-weight: 600; }
  .show-pass { position: relative; }
  .show-pass input { padding-right: 2.8rem; }
  .toggle-pass { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; font-family: var(--font-body); }
  .toggle-pass:hover { color: var(--text); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Uni<span>Ride</span></a>
  <div class="nav-links">
    <a href="register.html">Create account</a>
  </div>
</nav>
<div class="page-wrapper">
  <div class="page-center fade-in">
    <div class="brand-mark">
      <div class="logo">Uni<span>Ride</span></div>
      <p>Father Adasu University Makurdi</p>
    </div>
    <div class="card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your UniRide account</p>
      <div id="error-msg" class="alert alert-error" style="display:none;"></div>
      <div class="form-group">
        <label>School Email</label>
        <input type="email" id="email" placeholder="you@faum.edu.ng" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="show-pass">
          <input type="password" id="password" placeholder="Enter your password" />
          <button class="toggle-pass" onclick="togglePass()">Show</button>
        </div>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
      <button class="btn btn-primary" onclick="handleLogin()" id="login-btn">Sign in</button>
      <div class="divider">or</div>
      <button class="btn btn-secondary" onclick="window.location.href='register.html'">Create an account</button>
      <p class="signup-prompt">New to UniRide? <a href="register.html">Sign up here</a></p>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function togglePass() {
    const input = document.getElementById('password');
    const btn = document.querySelector('.toggle-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? 'Show' : 'Hide';
  }
  window.togglePass = togglePass;

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    if (!email || !password) { showError('Please fill in all fields.'); return; }

    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;
      const userDoc = await getDoc(doc(db, 'users', uid));
      if (userDoc.exists()) {
        localStorage.setItem('user', JSON.stringify({ id: uid, ...userDoc.data() }));
        localStorage.setItem('token', await userCredential.user.getIdToken());
      }
      window.location.href = 'dashboard.html';
    } catch (err) {
      const messages = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/invalid-credential': 'Invalid email or password.'
      };
      showError(messages[err.code] || 'Sign in failed. Please try again.');
      btn.innerHTML = 'Sign in';
      btn.disabled = false;
    }
  }
  window.handleLogin = handleLogin;

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
